<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>All Submissions | Namal FYP Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="../assets/tailwind-config.js"></script>
    <link href="../assets/styles.css" rel="stylesheet"/>
</head>
<body class="font-body-md text-on-surface">
    <div id="app-sidebar"></div>
    <main class="ml-sidebar-width min-h-screen">
        <div id="app-topnav"></div>
        <div class="pt-24 px-margin-desktop pb-margin-desktop max-w-container-max-width mx-auto space-y-gutter">

            <header class="flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
                <div>
                    <h1 class="font-headline-lg text-headline-lg text-primary">All Submissions</h1>
                    <p class="font-body-md text-text-muted">Portal-wide view of every student submission.</p>
                </div>
                <div class="flex gap-2 flex-wrap">
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[18px]">search</span>
                        <input id="search-input" class="pl-9 pr-4 py-2.5 border border-outline-variant rounded-xl text-sm bg-surface-container-low w-48" placeholder="Search..." type="text"/>
                    </div>
                    <select id="filter-status" class="px-4 py-2.5 border border-outline-variant rounded-xl text-sm bg-surface-container-low">
                        <option value="">All Statuses</option>
                        <option value="Submitted">Submitted</option>
                        <option value="Reviewed">Reviewed</option>
                        <option value="Late_Submission">Late Submission</option>
                    </select>
                </div>
            </header>

            <!-- Stats -->
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                <div class="bg-surface-white border border-outline-variant/30 rounded-xl p-4 text-center custom-shadow">
                    <p class="text-2xl font-bold text-primary"        id="stat-total">—</p>
                    <p class="font-label-sm text-on-surface-variant">Total</p>
                </div>
                <div class="bg-surface-white border border-outline-variant/30 rounded-xl p-4 text-center custom-shadow">
                    <p class="text-2xl font-bold text-success-emerald" id="stat-reviewed">—</p>
                    <p class="font-label-sm text-on-surface-variant">Reviewed</p>
                </div>
                <div class="bg-surface-white border border-outline-variant/30 rounded-xl p-4 text-center custom-shadow">
                    <p class="text-2xl font-bold text-warning-amber"  id="stat-pending">—</p>
                    <p class="font-label-sm text-on-surface-variant">Pending</p>
                </div>
                <div class="bg-surface-white border border-outline-variant/30 rounded-xl p-4 text-center custom-shadow">
                    <p class="text-2xl font-bold text-error"          id="stat-late">—</p>
                    <p class="font-label-sm text-on-surface-variant">Late</p>
                </div>
            </div>

            <!-- Table -->
            <div class="bento-card overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-surface-container-low">
                            <tr>
                                <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">File</th>
                                <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Group</th>
                                <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Project</th>
                                <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Milestone</th>
                                <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Version</th>
                                <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Status</th>
                                <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase text-center">Download</th>
                            </tr>
                        </thead>
                        <tbody id="subs-tbody" class="divide-y divide-outline-variant">
                            <tr><td colspan="7" class="px-6 py-12 text-center text-on-surface-variant">
                                <span class="material-symbols-outlined text-4xl block text-outline mb-2">hourglass_empty</span>Loading...
                            </td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="../assets/auth.js"></script>
    <script src="../assets/layout.js"></script>
    <script>
        initPage('coordinator', 'submissions');

        const token = getToken();
        const base = '../';
        let allSubs = [];

        const fetchAPI = async (url, opts = {}) => {
            const headers = { 'Authorization': `Bearer ${token}`, ...opts.headers };
            if (opts.body && !(opts.body instanceof FormData)) {
                headers['Content-Type'] = 'application/json';
                opts.body = JSON.stringify(opts.body);
            }
            const r = await fetch(base + 'api' + url, { ...opts, headers });
            const data = await r.json().catch(() => ({}));
            if (!r.ok) throw new Error(data.message || r.statusText);
            return data;
        };

        const statusBadge = s => {
            const m = { 'Reviewed': 'bg-success-emerald/10 text-success-emerald', 'Submitted': 'bg-warning-amber/10 text-warning-amber', 'Late_Submission': 'bg-error/10 text-error' };
            return `<span class="px-2.5 py-0.5 rounded-full text-xs font-bold ${m[s]||'bg-outline-variant/20 text-text-muted'}">${s.replace('_',' ')}</span>`;
        };

        function renderTable(subs) {
            const tbody = document.getElementById('subs-tbody');
            if (!subs.length) {
                tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-12 text-center text-on-surface-variant">
                    <span class="material-symbols-outlined text-4xl block text-outline mb-2">inbox</span>No submissions found.</td></tr>`;
                return;
            }
            tbody.innerHTML = subs.map(s => `
                <tr class="hover:bg-surface-container-low transition-colors">
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-2">
                            <span class="material-symbols-outlined text-outline text-[18px]">description</span>
                            <span class="font-medium truncate max-w-[140px]" title="${s.FileName||''}">${s.FileName || 'No file'}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 font-semibold">${s.GroupName}</td>
                    <td class="px-6 py-4 text-sm text-on-surface-variant max-w-[150px] truncate" title="${s.ProjectTitle||''}">${s.ProjectTitle||'—'}</td>
                    <td class="px-6 py-4 text-sm">${s.MilestoneTitle}</td>
                    <td class="px-6 py-4 font-mono text-secondary font-bold">${s.SubmissionVersion}</td>
                    <td class="px-6 py-4">${statusBadge(s.Status)}</td>
                    <td class="px-6 py-4 text-center">
                        ${s.FileID
                            ? `<a href="${base}api/submissions/download/${s.FileID}"
                                  class="flex items-center justify-center gap-1 mx-auto px-3 py-1.5 bg-primary/10 text-primary rounded-lg text-xs font-bold hover:bg-primary/20 w-fit transition-colors">
                                  <span class="material-symbols-outlined text-[14px]">download</span> Download
                               </a>`
                            : `<span class="text-text-muted text-xs">No file</span>`}
                    </td>
                </tr>
            `).join('');
        }

        async function load() {
            try {
                allSubs = await fetchAPI('/submissions');
                document.getElementById('stat-total').textContent    = allSubs.length;
                document.getElementById('stat-reviewed').textContent = allSubs.filter(s => s.Status === 'Reviewed').length;
                document.getElementById('stat-pending').textContent  = allSubs.filter(s => s.Status === 'Submitted').length;
                document.getElementById('stat-late').textContent     = allSubs.filter(s => s.Status === 'Late_Submission').length;
                renderTable(allSubs);
            } catch(e) {
                document.getElementById('subs-tbody').innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-error">${e.message}</td></tr>`;
            }
        }

        function applyFilters() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const st = document.getElementById('filter-status').value;
            renderTable(allSubs.filter(s => {
                const matchQ = !q || (s.FileName||'').toLowerCase().includes(q) || (s.GroupName||'').toLowerCase().includes(q) || (s.MilestoneTitle||'').toLowerCase().includes(q);
                const matchS = !st || s.Status === st;
                return matchQ && matchS;
            }));
        }

        document.getElementById('search-input').addEventListener('input', applyFilters);
        document.getElementById('filter-status').addEventListener('change', applyFilters);

        load();
    </script>
</body>
</html>
