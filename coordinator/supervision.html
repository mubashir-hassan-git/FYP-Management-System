<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Supervision | Namal FYP Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="../assets/tailwind-config.js"></script>
    <link href="../assets/styles.css" rel="stylesheet"/>
</head>
<body class="font-body-md text-on-surface">
<div id="app-sidebar"></div>
<main class="ml-sidebar-width min-h-screen">
    <div id="app-topnav"></div>
    <div class="pt-24 px-margin-desktop pb-margin-desktop max-w-container-max-width mx-auto space-y-gutter">

        <header>
            <h1 class="font-headline-lg text-headline-lg text-primary">Supervisor Assignment</h1>
            <p class="font-body-md text-text-muted">Assign supervisors and co-supervisors to projects. Supervisor and Co-Supervisor must be different people.</p>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
            <div class="bg-surface-white border border-outline-variant/30 rounded-xl p-4 text-center custom-shadow">
                <p class="text-2xl font-bold text-primary"          id="stat-total">—</p>
                <p class="font-label-sm text-on-surface-variant">Total Projects</p>
            </div>
            <div class="bg-surface-white border border-outline-variant/30 rounded-xl p-4 text-center custom-shadow">
                <p class="text-2xl font-bold text-success-emerald"  id="stat-assigned">—</p>
                <p class="font-label-sm text-on-surface-variant">With Supervisor</p>
            </div>
            <div class="bg-surface-white border border-outline-variant/30 rounded-xl p-4 text-center custom-shadow">
                <p class="text-2xl font-bold text-warning-amber"    id="stat-missing">—</p>
                <p class="font-label-sm text-on-surface-variant">Unassigned</p>
            </div>
        </div>

        <div class="bento-card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-surface-container-low">
                        <tr>
                            <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Project</th>
                            <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Group</th>
                            <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Supervisor</th>
                            <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Co-Supervisor</th>
                            <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase text-center">Assign</th>
                        </tr>
                    </thead>
                    <tbody id="sup-tbody" class="divide-y divide-outline-variant">
                        <tr><td colspan="5" class="px-6 py-12 text-center text-on-surface-variant">
                            <span class="material-symbols-outlined text-4xl block text-outline mb-2">hourglass_empty</span>Loading...
                        </td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<!-- Assign Supervisors Modal -->
<div id="assign-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl">
        <div class="p-6 border-b border-outline-variant/20 flex items-center justify-between">
            <div>
                <h3 class="font-headline-sm text-primary">Assign Supervisors</h3>
                <p id="modal-project-title" class="font-label-sm text-on-surface-variant mt-0.5"></p>
            </div>
            <button id="close-assign" class="p-1.5 hover:bg-surface-container-high rounded-lg"><span class="material-symbols-outlined">close</span></button>
        </div>
        <div class="p-6 space-y-4">
            <input type="hidden" id="assign-proj-id"/>
            <div>
                <label class="block font-label-md font-bold mb-2">Supervisor *</label>
                <select id="sel-supervisor" class="w-full px-4 py-3 border border-outline-variant rounded-xl bg-surface-container-low" required>
                    <option value="">— Select Supervisor —</option>
                </select>
            </div>
            <div>
                <label class="block font-label-md font-bold mb-2">Co-Supervisor <span class="font-normal text-on-surface-variant text-sm">(optional, must differ from supervisor)</span></label>
                <select id="sel-cosupervisor" class="w-full px-4 py-3 border border-outline-variant rounded-xl bg-surface-container-low">
                    <option value="">— None —</option>
                </select>
            </div>
            <div id="assign-error" class="hidden bg-error-container text-on-error-container rounded-xl px-4 py-3 text-sm"></div>
            <div class="flex gap-3 pt-2">
                <button id="cancel-assign" class="flex-1 px-4 py-3 border border-outline-variant rounded-xl font-label-md hover:bg-surface-container-low">Cancel</button>
                <button id="do-assign" class="flex-1 bg-primary text-on-primary px-4 py-3 rounded-xl font-label-md font-bold hover:opacity-90">Assign</button>
            </div>
        </div>
    </div>
</div>

<script src="../assets/auth.js"></script>
<script src="../assets/layout.js"></script>
<script>
    initPage('coordinator', 'supervision');

    const token = getToken();
    const base  = '../';
    let projects = [];
    let faculty  = [];

    const fetchAPI = async (url, opts = {}) => {
        const headers = { 'Authorization': `Bearer ${token}`, ...opts.headers };
        if (opts.body && !(opts.body instanceof FormData)) { headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(opts.body); }
        const r = await fetch(base + 'api' + url, { ...opts, headers });
        const d = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(d.message || r.statusText);
        return d;
    };

    const toast = (msg, err=false) => {
        const t = document.createElement('div');
        t.className = `fixed bottom-6 right-6 ${err?'bg-error text-on-error':'bg-success-emerald text-white'} px-5 py-3 rounded-xl shadow-xl flex items-center gap-2 z-50 font-label-md`;
        t.innerHTML = `<span class="material-symbols-outlined">${err?'error':'check_circle'}</span>${msg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 4000);
    };

    function renderTable(list) {
        const tbody = document.getElementById('sup-tbody');
        if (!list.length) {
            tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-on-surface-variant"><span class="material-symbols-outlined text-4xl block text-outline mb-2">inbox</span>No projects found.</td></tr>`;
            return;
        }
        tbody.innerHTML = list.map(p => {
            let supervisor = '—', coSupervisor = '—';
            if (p.supervisors) {
                p.supervisors.split(', ').forEach(s => {
                    if (s.includes('(Supervisor)'))    supervisor   = s.replace(' (Supervisor)','');
                    if (s.includes('(Co-Supervisor)')) coSupervisor = s.replace(' (Co-Supervisor)','');
                });
            }
            const svCls = supervisor === '—' ? 'text-error font-semibold' : 'text-on-surface';
            return `
            <tr class="hover:bg-surface-container-low transition-colors">
                <td class="px-6 py-4 font-semibold text-primary max-w-[200px] truncate" title="${p.Title}">${p.Title}</td>
                <td class="px-6 py-4 text-on-surface-variant">${p.GroupName||'—'}</td>
                <td class="px-6 py-4 font-semibold ${svCls}">${supervisor}</td>
                <td class="px-6 py-4 text-on-surface-variant">${coSupervisor}</td>
                <td class="px-6 py-4 text-center">
                    <button class="assign-btn bg-primary text-on-primary px-3 py-1.5 rounded-lg text-xs font-bold hover:opacity-90"
                        data-id="${p.ProjectID}" data-title="${p.Title}">
                        ${supervisor === '—' ? 'Assign' : 'Reassign'}
                    </button>
                </td>
            </tr>`;
        }).join('');

        document.querySelectorAll('.assign-btn').forEach(btn => {
            btn.onclick = () => openModal(btn.dataset.id, btn.dataset.title);
        });
    }

    const modal = document.getElementById('assign-modal');
    function openModal(projectId, title) {
        document.getElementById('assign-proj-id').value = projectId;
        document.getElementById('modal-project-title').textContent = title;
        document.getElementById('assign-error').classList.add('hidden');
        const opts = faculty.map(f => `<option value="${f.FacultyID}">${f.FirstName} ${f.LastName||''} (${f.EmployeeNo})</option>`).join('');
        document.getElementById('sel-supervisor').innerHTML   = `<option value="">— Select Supervisor —</option>${opts}`;
        document.getElementById('sel-cosupervisor').innerHTML = `<option value="">— None —</option>${opts}`;
        modal.classList.remove('hidden');
    }
    document.getElementById('close-assign').onclick  = () => modal.classList.add('hidden');
    document.getElementById('cancel-assign').onclick = () => modal.classList.add('hidden');
    modal.addEventListener('click', e => { if (e.target === modal) modal.classList.add('hidden'); });

    document.getElementById('do-assign').onclick = async () => {
        const errEl = document.getElementById('assign-error');
        errEl.classList.add('hidden');
        const projectId     = document.getElementById('assign-proj-id').value;
        const supervisorId  = document.getElementById('sel-supervisor').value;
        const coSupervisorId= document.getElementById('sel-cosupervisor').value;

        if (!supervisorId) { errEl.textContent='Please select a supervisor.'; errEl.classList.remove('hidden'); return; }
        if (coSupervisorId && coSupervisorId === supervisorId) { errEl.textContent='Supervisor and Co-Supervisor must be different people.'; errEl.classList.remove('hidden'); return; }

        try {
            await fetchAPI('/projects/assign-supervisors', { method:'POST', body:{ projectId, supervisorId, coSupervisorId: coSupervisorId||null } });
            modal.classList.add('hidden');
            toast('Supervisors assigned successfully');
            load();
        } catch(e) { errEl.textContent=e.message; errEl.classList.remove('hidden'); }
    };

    async function load() {
        try {
            [projects, faculty] = await Promise.all([fetchAPI('/projects'), fetchAPI('/faculty')]);
            document.getElementById('stat-total').textContent    = projects.length;
            document.getElementById('stat-assigned').textContent = projects.filter(p => p.supervisors && p.supervisors.includes('Supervisor')).length;
            document.getElementById('stat-missing').textContent  = projects.filter(p => !p.supervisors || !p.supervisors.includes('Supervisor')).length;
            renderTable(projects);
        } catch(e) {
            document.getElementById('sup-tbody').innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-error">${e.message}</td></tr>`;
        }
    }
    load();
</script>
</body>
</html>
