<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Projects | Namal FYP Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="../assets/tailwind-config.js"></script>
    <link href="../assets/styles.css" rel="stylesheet"/>
</head>
<body class="font-body-md text-on-surface">
<div id="app-sidebar"></div>
<main class="ml-sidebar-width min-h-screen">
    <div id="app-topnav"></div>
    <div class="pt-24 px-margin-desktop pb-margin-desktop max-w-container-max-width mx-auto space-y-gutter">

        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
            <div>
                <h1 class="font-headline-lg text-headline-lg text-primary">Project Management</h1>
                <p class="font-body-md text-text-muted">Create, approve and manage FYP projects.</p>
            </div>
            <div class="flex gap-2">
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[18px]">search</span>
                    <input id="search-input" class="pl-9 pr-4 py-2.5 border border-outline-variant rounded-xl text-sm bg-surface-container-low w-44" placeholder="Search..." type="text"/>
                </div>
                <button id="btn-new-project" class="bg-primary text-on-primary px-5 py-2.5 rounded-xl font-label-md flex items-center gap-2 hover:opacity-90 shadow-md">
                    <span class="material-symbols-outlined text-[18px]">add</span> New Project
                </button>
            </div>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
            <div class="bg-surface-white border border-outline-variant/30 rounded-xl p-4 text-center custom-shadow">
                <p class="text-2xl font-bold text-primary"          id="stat-total">—</p>
                <p class="font-label-sm text-on-surface-variant">Total</p>
            </div>
            <div class="bg-surface-white border border-outline-variant/30 rounded-xl p-4 text-center custom-shadow">
                <p class="text-2xl font-bold text-success-emerald"  id="stat-active">—</p>
                <p class="font-label-sm text-on-surface-variant">Approved/Active</p>
            </div>
            <div class="bg-surface-white border border-outline-variant/30 rounded-xl p-4 text-center custom-shadow">
                <p class="text-2xl font-bold text-warning-amber"    id="stat-proposed">—</p>
                <p class="font-label-sm text-on-surface-variant">Proposed</p>
            </div>
            <div class="bg-surface-white border border-outline-variant/30 rounded-xl p-4 text-center custom-shadow">
                <p class="text-2xl font-bold text-secondary"        id="stat-completed">—</p>
                <p class="font-label-sm text-on-surface-variant">Completed</p>
            </div>
        </div>

        <div class="bento-card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-surface-container-low">
                        <tr>
                            <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">ID</th>
                            <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Title</th>
                            <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Domain</th>
                            <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Status</th>
                            <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Group</th>
                            <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Supervisors</th>
                            <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="proj-tbody" class="divide-y divide-outline-variant">
                        <tr><td colspan="7" class="px-6 py-12 text-center text-on-surface-variant">
                            <span class="material-symbols-outlined text-4xl block text-outline mb-2">hourglass_empty</span>Loading...
                        </td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<!-- New Project Modal -->
<div id="new-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl">
        <div class="p-6 border-b border-outline-variant/20 flex items-center justify-between">
            <h3 class="font-headline-sm text-primary">New FYP Project</h3>
            <button id="close-new" class="p-1.5 hover:bg-surface-container-high rounded-lg"><span class="material-symbols-outlined">close</span></button>
        </div>
        <form id="new-form" class="p-6 space-y-4">
            <div>
                <label class="block font-label-md font-bold mb-2">Project Title *</label>
                <input id="proj-title" type="text" class="w-full px-4 py-3 border border-outline-variant rounded-xl bg-surface-container-low focus:ring-2 focus:ring-primary/30" required/>
            </div>
            <div>
                <label class="block font-label-md font-bold mb-2">Domain *</label>
                <input id="proj-domain" type="text" placeholder="e.g. AI, Cybersecurity, IoT" class="w-full px-4 py-3 border border-outline-variant rounded-xl bg-surface-container-low focus:ring-2 focus:ring-primary/30" required/>
            </div>
            <div>
                <label class="block font-label-md font-bold mb-2">Description</label>
                <textarea id="proj-desc" rows="3" class="w-full px-4 py-3 border border-outline-variant rounded-xl bg-surface-container-low resize-none focus:ring-2 focus:ring-primary/30" placeholder="Brief project description..."></textarea>
            </div>
            <div id="new-error" class="hidden bg-error-container text-on-error-container rounded-xl px-4 py-3 text-sm"></div>
            <div class="flex gap-3 pt-2">
                <button type="button" id="cancel-new" class="flex-1 px-4 py-3 border border-outline-variant rounded-xl font-label-md hover:bg-surface-container-low">Cancel</button>
                <button type="submit" class="flex-1 bg-primary text-on-primary px-4 py-3 rounded-xl font-label-md font-bold hover:opacity-90">Create Project</button>
            </div>
        </form>
    </div>
</div>

<!-- Assign Group Modal -->
<div id="assign-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl w-full max-w-sm shadow-2xl">
        <div class="p-6 border-b border-outline-variant/20 flex items-center justify-between">
            <h3 class="font-headline-sm text-primary">Assign Group</h3>
            <button id="close-assign" class="p-1.5 hover:bg-surface-container-high rounded-lg"><span class="material-symbols-outlined">close</span></button>
        </div>
        <div class="p-6 space-y-4">
            <input type="hidden" id="assign-proj-id"/>
            <div>
                <label class="block font-label-md font-bold mb-2">Select Group</label>
                <select id="assign-group-sel" class="w-full px-4 py-3 border border-outline-variant rounded-xl bg-surface-container-low"></select>
            </div>
            <div id="assign-error" class="hidden bg-error-container text-on-error-container rounded-xl px-4 py-3 text-sm"></div>
            <div class="flex gap-3">
                <button id="cancel-assign" class="flex-1 px-4 py-3 border border-outline-variant rounded-xl font-label-md">Cancel</button>
                <button id="do-assign" class="flex-1 bg-primary text-on-primary px-4 py-3 rounded-xl font-label-md font-bold hover:opacity-90">Assign</button>
            </div>
        </div>
    </div>
</div>

<script src="../assets/auth.js"></script>
<script src="../assets/layout.js"></script>
<script>
    initPage('coordinator', 'projects');

    const token = getToken();
    const base  = '../';
    let allProjects = [];
    let allGroups   = [];

    const fetchAPI = async (url, opts = {}) => {
        const headers = { 'Authorization': `Bearer ${token}`, ...opts.headers };
        if (opts.body && !(opts.body instanceof FormData)) { headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(opts.body); }
        const r = await fetch(base + 'api' + url, { ...opts, headers });
        const d = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(d.message || r.statusText);
        return d;
    };

    const toast = (msg, err=false) => {
        const t = document.createElement('div');
        t.className = `fixed bottom-6 right-6 ${err?'bg-error text-on-error':'bg-success-emerald text-white'} px-5 py-3 rounded-xl shadow-xl flex items-center gap-2 z-50 font-label-md`;
        t.innerHTML = `<span class="material-symbols-outlined">${err?'error':'check_circle'}</span>${msg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 4000);
    };

    const statusBadge = s => {
        const m = { 'Approved':'bg-success-emerald/10 text-success-emerald', 'Proposed':'bg-warning-amber/10 text-warning-amber', 'Completed':'bg-primary/10 text-primary', 'Rejected':'bg-error/10 text-error' };
        return `<span class="px-2.5 py-0.5 rounded-full text-xs font-bold ${m[s]||'bg-outline-variant/20 text-text-muted'}">${s}</span>`;
    };

    function renderTable(list) {
        const tbody = document.getElementById('proj-tbody');
        if (!list.length) { tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-12 text-center text-on-surface-variant"><span class="material-symbols-outlined text-4xl block text-outline mb-2">inbox</span>No projects found.</td></tr>`; return; }
        tbody.innerHTML = list.map(p => {
            const hasGroup = p.GroupName && p.GroupName !== 'Unassigned';
            const actions = `
                <div class="flex items-center justify-center gap-1 flex-wrap">
                    ${!hasGroup ? `<button class="assign-btn px-2 py-1 bg-secondary/10 text-secondary rounded-lg text-xs font-bold hover:bg-secondary/20" data-id="${p.ProjectID}">Assign Group</button>` : ''}
                    <button class="delete-btn px-2 py-1 bg-error/10 text-error rounded-lg text-xs font-bold hover:bg-error/20" data-id="${p.ProjectID}">Delete</button>
                </div>`;
            return `
            <tr class="hover:bg-surface-container-low transition-colors">
                <td class="px-6 py-4 font-mono font-bold text-on-surface-variant text-xs">PRJ-${String(p.ProjectID).padStart(3,'0')}</td>
                <td class="px-6 py-4 font-semibold text-primary max-w-[200px] truncate" title="${p.Title}">${p.Title}</td>
                <td class="px-6 py-4 text-sm text-on-surface-variant">${p.Domain||'—'}</td>
                <td class="px-6 py-4">${statusBadge(p.ProjectStatus)}</td>
                <td class="px-6 py-4 font-semibold ${hasGroup?'':'text-on-surface-variant'}">${p.GroupName||'Unassigned'}</td>
                <td class="px-6 py-4 text-sm text-on-surface-variant max-w-[150px] truncate" title="${p.supervisors||''}">${p.supervisors||'Unassigned'}</td>
                <td class="px-6 py-4">${actions}</td>
            </tr>`;
        }).join('');

        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.onclick = async () => {
                if (!confirm('Delete this project? This cannot be undone.')) return;
                try { await fetchAPI(`/projects/${btn.dataset.id}`, { method: 'DELETE' }); toast('Project deleted'); load(); }
                catch(e) { toast(e.message, true); }
            };
        });

        document.querySelectorAll('.assign-btn').forEach(btn => {
            btn.onclick = () => openAssignModal(btn.dataset.id);
        });
    }

    // New project modal
    const newModal = document.getElementById('new-modal');
    document.getElementById('btn-new-project').onclick = () => { document.getElementById('new-error').classList.add('hidden'); document.getElementById('new-form').reset(); newModal.classList.remove('hidden'); };
    document.getElementById('close-new').onclick   = () => newModal.classList.add('hidden');
    document.getElementById('cancel-new').onclick  = () => newModal.classList.add('hidden');
    newModal.addEventListener('click', e => { if (e.target === newModal) newModal.classList.add('hidden'); });

    document.getElementById('new-form').addEventListener('submit', async e => {
        e.preventDefault();
        const errEl = document.getElementById('new-error');
        errEl.classList.add('hidden');
        try {
            await fetchAPI('/projects', { method: 'POST', body: {
                title:       document.getElementById('proj-title').value.trim(),
                domain:      document.getElementById('proj-domain').value.trim(),
                description: document.getElementById('proj-desc').value.trim()
            }});
            newModal.classList.add('hidden');
            toast('Project created successfully');
            load();
        } catch(err) { errEl.textContent = err.message; errEl.classList.remove('hidden'); }
    });

    // Assign group modal
    const assignModal = document.getElementById('assign-modal');
    function openAssignModal(projectId) {
        document.getElementById('assign-proj-id').value = projectId;
        document.getElementById('assign-error').classList.add('hidden');
        const unassigned = allGroups.filter(g => g.projectTitle === 'Unassigned' || !g.projectTitle);
        if (!unassigned.length) { toast('All groups already have projects assigned.', true); return; }
        document.getElementById('assign-group-sel').innerHTML = unassigned.map(g => `<option value="${g.groupId}">${g.groupName}</option>`).join('');
        assignModal.classList.remove('hidden');
    }
    document.getElementById('close-assign').onclick  = () => assignModal.classList.add('hidden');
    document.getElementById('cancel-assign').onclick = () => assignModal.classList.add('hidden');
    document.getElementById('do-assign').onclick = async () => {
        const projectId = document.getElementById('assign-proj-id').value;
        const groupId   = document.getElementById('assign-group-sel').value;
        const errEl = document.getElementById('assign-error');
        try {
            await fetchAPI('/projects/assign', { method: 'POST', body: { projectId, groupId } });
            assignModal.classList.add('hidden');
            toast('Group assigned successfully');
            load();
        } catch(e) { errEl.textContent = e.message; errEl.classList.remove('hidden'); }
    };

    document.getElementById('search-input').addEventListener('input', e => {
        const q = e.target.value.toLowerCase();
        renderTable(q ? allProjects.filter(p => (p.Title||'').toLowerCase().includes(q) || (p.Domain||'').toLowerCase().includes(q)) : allProjects);
    });

    async function load() {
        try {
            [allProjects, allGroups] = await Promise.all([fetchAPI('/projects'), fetchAPI('/groups')]);
            document.getElementById('stat-total').textContent     = allProjects.length;
            document.getElementById('stat-active').textContent    = allProjects.filter(p => ['Approved','Active'].includes(p.ProjectStatus)).length;
            document.getElementById('stat-proposed').textContent  = allProjects.filter(p => p.ProjectStatus === 'Proposed').length;
            document.getElementById('stat-completed').textContent = allProjects.filter(p => p.ProjectStatus === 'Completed').length;
            renderTable(allProjects);
        } catch(e) {
            document.getElementById('proj-tbody').innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-error">${e.message}</td></tr>`;
        }
    }
    load();
</script>
</body>
</html>
