<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Results | Namal FYP Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="../assets/tailwind-config.js"></script>
    <link href="../assets/styles.css" rel="stylesheet"/>
</head>
<body class="font-body-md text-on-surface">
<div id="app-sidebar"></div>
<main class="ml-sidebar-width min-h-screen">
    <div id="app-topnav"></div>
    <div class="pt-24 px-margin-desktop pb-margin-desktop max-w-container-max-width mx-auto space-y-gutter">

        <header>
            <h1 class="font-headline-lg text-headline-lg text-primary">Evaluation Results</h1>
            <p class="font-body-md text-text-muted">Click any completed evaluation to view detailed scores.</p>
        </header>

        <div class="bento-card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-surface-container-low">
                        <tr>
                            <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Group</th>
                            <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Project</th>
                            <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Milestone</th>
                            <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Date</th>
                            <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Score</th>
                            <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Status</th>
                            <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase text-center">Detail</th>
                        </tr>
                    </thead>
                    <tbody id="results-tbody" class="divide-y divide-outline-variant">
                        <tr><td colspan="7" class="px-6 py-12 text-center text-on-surface-variant">
                            <span class="material-symbols-outlined text-4xl block text-outline mb-2">hourglass_empty</span>Loading...
                        </td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<!-- Result Detail Modal -->
<div id="result-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl w-full max-w-lg shadow-2xl max-h-[90vh] flex flex-col">
        <div class="p-6 border-b border-outline-variant/20 flex items-center justify-between">
            <div>
                <h3 id="modal-group" class="font-headline-sm text-primary">—</h3>
                <p id="modal-project" class="font-label-sm text-on-surface-variant mt-0.5">—</p>
            </div>
            <button id="close-modal" class="p-1.5 hover:bg-surface-container-high rounded-lg"><span class="material-symbols-outlined">close</span></button>
        </div>
        <div id="modal-body" class="flex-1 overflow-y-auto p-6 space-y-4">
            <div class="text-center py-6 text-on-surface-variant">Loading...</div>
        </div>
    </div>
</div>

<script src="../assets/auth.js"></script>
<script src="../assets/layout.js"></script>
<script>
    initPage('evaluator', 'results');

    const token  = getToken();
    const base   = '../';
    const params = new URLSearchParams(window.location.search);

    const fetchAPI = async (url, opts = {}) => {
        const r = await fetch(base + 'api' + url, { ...opts, headers: { 'Authorization': `Bearer ${token}`, ...(opts.headers||{}) } });
        const d = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(d.message || r.statusText);
        return d;
    };

    async function openModal(evalId, groupName, projectTitle) {
        const modal = document.getElementById('result-modal');
        const body  = document.getElementById('modal-body');
        document.getElementById('modal-group').textContent   = groupName;
        document.getElementById('modal-project').textContent = projectTitle;
        modal.classList.remove('hidden');
        body.innerHTML = '<div class="text-center py-6 text-on-surface-variant"><span class="material-symbols-outlined text-3xl block mb-2">hourglass_empty</span>Loading...</div>';

        try {
            const data = await fetchAPI(`/evaluations/marking-sheet/${evalId}`);
            const rubs = data.rubrics;
            const totMax = rubs.reduce((s, r) => s + r.maxMarks, 0);
            const totObt = rubs.reduce((s, r) => s + (r.obtainedMarks || 0), 0);
            const pct = totMax > 0 ? ((totObt / totMax) * 100).toFixed(1) : 0;

            body.innerHTML = `
                <div class="bg-success-emerald/10 border border-success-emerald/20 rounded-xl p-4 flex items-center justify-between mb-2">
                    <span class="font-label-md font-bold text-success-emerald">Overall Score</span>
                    <span class="text-xl font-bold text-success-emerald">${totObt.toFixed(1)} / ${totMax} (${pct}%)</span>
                </div>
                ${rubs.map(r => `
                <div class="bg-surface-container-low rounded-xl p-4 border border-outline-variant/20">
                    <div class="flex items-start justify-between mb-1">
                        <p class="font-semibold text-on-surface text-sm">${r.criteriaName}</p>
                        <span class="text-sm font-bold text-primary">${r.obtainedMarks ?? '—'} / ${r.maxMarks}</span>
                    </div>
                    ${r.remarks ? `<p class="text-xs text-secondary italic">"${r.remarks}"</p>` : ''}
                    <div class="mt-2 h-1.5 bg-surface-container-high rounded-full overflow-hidden">
                        <div class="bg-primary h-full rounded-full" style="width:${r.obtainedMarks!=null?((r.obtainedMarks/r.maxMarks)*100).toFixed(0):0}%"></div>
                    </div>
                </div>`).join('')}`;
        } catch(e) {
            body.innerHTML = `<div class="text-error text-sm">${e.message}</div>`;
        }
    }

    document.getElementById('close-modal').onclick = () => document.getElementById('result-modal').classList.add('hidden');
    document.getElementById('result-modal').addEventListener('click', e => { if (e.target === document.getElementById('result-modal')) document.getElementById('result-modal').classList.add('hidden'); });

    async function load() {
        try {
            const data = await fetchAPI('/evaluations/dashboard');
            const tbody = document.getElementById('results-tbody');
            const completed = data.evaluations.filter(e => e.status === 'Completed');

            // Auto-open if id in URL
            const reqId = params.get('id');
            if (reqId) {
                const ev = completed.find(e => String(e.evaluationId) === reqId);
                if (ev) openModal(ev.evaluationId, ev.groupName, ev.projectTitle);
            }

            if (!data.evaluations.length) {
                tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-12 text-center text-on-surface-variant">No evaluations assigned yet.</td></tr>`;
                return;
            }

            tbody.innerHTML = data.evaluations.map(ev => {
                const isComplete = ev.status === 'Completed';
                const statusCls  = isComplete ? 'bg-success-emerald/10 text-success-emerald' : 'bg-warning-amber/10 text-warning-amber';
                return `
                <tr class="hover:bg-surface-container-low transition-colors ${isComplete ? 'cursor-pointer' : ''}"
                    ${isComplete ? `onclick="openModal(${ev.evaluationId},'${ev.groupName.replace(/'/g,"\\'")}','${ev.projectTitle.replace(/'/g,"\\'")}' )"` : ''}>
                    <td class="px-6 py-4 font-semibold text-primary">${ev.groupName}</td>
                    <td class="px-6 py-4 text-sm text-on-surface-variant max-w-[150px] truncate" title="${ev.projectTitle}">${ev.projectTitle}</td>
                    <td class="px-6 py-4 text-sm">${ev.milestone}</td>
                    <td class="px-6 py-4 text-on-surface-variant">${new Date(ev.date).toLocaleDateString()}</td>
                    <td class="px-6 py-4 font-bold ${isComplete ? 'text-primary' : 'text-on-surface-variant'}">${isComplete ? `${ev.score || '—'}` : '—'}</td>
                    <td class="px-6 py-4"><span class="px-2.5 py-0.5 rounded-full text-xs font-bold ${statusCls}">${ev.status}</span></td>
                    <td class="px-6 py-4 text-center">
                        ${isComplete ? `<button class="text-primary hover:bg-primary/10 rounded-lg p-1.5"><span class="material-symbols-outlined text-[20px]">visibility</span></button>` : '<span class="text-on-surface-variant text-xs">Pending</span>'}
                    </td>
                </tr>`;
            }).join('');
        } catch(e) {
            document.getElementById('results-tbody').innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-error">${e.message}</td></tr>`;
        }
    }
    load();
</script>
</body>
</html>
