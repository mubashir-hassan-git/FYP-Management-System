<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Evaluations | Namal FYP Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="../assets/tailwind-config.js"></script>
    <link href="../assets/styles.css" rel="stylesheet"/>
</head>
<body class="font-body-md text-on-surface">
    <div id="app-sidebar"></div>
    <main class="ml-sidebar-width min-h-screen">
        <div id="app-topnav"></div>
        <div class="pt-24 px-margin-desktop pb-margin-desktop max-w-container-max-width mx-auto space-y-gutter">

            <header>
                <h1 class="font-headline-lg text-headline-lg text-primary">My Evaluations</h1>
                <p class="font-body-md text-text-muted">View all scheduled and completed evaluation sessions for your group.</p>
            </header>

            <!-- Stats -->
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                <div class="bg-surface-white border border-outline-variant/30 rounded-xl p-4 text-center custom-shadow">
                    <p class="text-2xl font-bold text-primary"          id="stat-total">—</p>
                    <p class="font-label-sm text-on-surface-variant">Total</p>
                </div>
                <div class="bg-surface-white border border-outline-variant/30 rounded-xl p-4 text-center custom-shadow">
                    <p class="text-2xl font-bold text-warning-amber"    id="stat-scheduled">—</p>
                    <p class="font-label-sm text-on-surface-variant">Scheduled</p>
                </div>
                <div class="bg-surface-white border border-outline-variant/30 rounded-xl p-4 text-center custom-shadow">
                    <p class="text-2xl font-bold text-success-emerald"  id="stat-completed">—</p>
                    <p class="font-label-sm text-on-surface-variant">Completed</p>
                </div>
                <div class="bg-surface-white border border-outline-variant/30 rounded-xl p-4 text-center custom-shadow">
                    <p class="text-2xl font-bold text-secondary"        id="stat-avg">—</p>
                    <p class="font-label-sm text-on-surface-variant">Avg Score %</p>
                </div>
            </div>

            <!-- Evaluations table -->
            <div class="bento-card overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-surface-container-low">
                            <tr>
                                <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Milestone</th>
                                <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Date</th>
                                <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Evaluators</th>
                                <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Status</th>
                                <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Score</th>
                            </tr>
                        </thead>
                        <tbody id="eval-tbody" class="divide-y divide-outline-variant">
                            <tr><td colspan="5" class="px-6 py-12 text-center text-on-surface-variant">
                                <span class="material-symbols-outlined text-4xl block text-outline mb-2">hourglass_empty</span>Loading...
                            </td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="../assets/auth.js"></script>
    <script src="../assets/layout.js"></script>
    <script>
        initPage('student', 'evaluations');

        const token = getToken();
        const base = '../';

        const fetchAPI = async (url, opts = {}) => {
            const r = await fetch(base + 'api' + url, {
                ...opts,
                headers: { 'Authorization': `Bearer ${token}`, ...(opts.headers || {}) }
            });
            const d = await r.json().catch(() => ({}));
            if (!r.ok) throw new Error(d.message || r.statusText);
            return d;
        };

        const statusBadge = s => {
            const m = { 'Completed': 'bg-success-emerald/10 text-success-emerald', 'Scheduled': 'bg-warning-amber/10 text-warning-amber', 'Absent': 'bg-error/10 text-error' };
            return `<span class="px-2.5 py-0.5 rounded-full text-xs font-bold ${m[s] || 'bg-outline-variant/20 text-text-muted'}">${s}</span>`;
        };

        async function load() {
            const tbody = document.getElementById('eval-tbody');
            try {
                // Get group ID from student dashboard
                const dash = await fetchAPI('/students/dashboard');
                const groupId = dash.student.groupId;

                if (!groupId) {
                    tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-on-surface-variant">
                        <span class="material-symbols-outlined text-4xl block text-outline mb-2">group_off</span>
                        No group assigned yet.</td></tr>`;
                    return;
                }

                // Fetch evaluations for this group
                const evals = await fetchAPI('/evaluations');
                const myEvals = evals.filter(e => e.GroupID == groupId || e.GroupName === dash.student.groupName);

                document.getElementById('stat-total').textContent     = myEvals.length;
                document.getElementById('stat-scheduled').textContent = myEvals.filter(e => e.Status === 'Scheduled').length;
                document.getElementById('stat-completed').textContent = myEvals.filter(e => e.Status === 'Completed').length;

                // Compute average score from results
                const results = await fetchAPI('/students/results').catch(() => ({ percentage: 0 }));
                document.getElementById('stat-avg').textContent = results.percentage ? `${results.percentage}%` : '—';

                if (!myEvals.length) {
                    tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-on-surface-variant">
                        <span class="material-symbols-outlined text-4xl block text-outline mb-2">event_busy</span>
                        No evaluations scheduled yet.</td></tr>`;
                    return;
                }

                tbody.innerHTML = myEvals.map(ev => {
                    const scoreCell = ev.Status === 'Completed'
                        ? `<span class="font-bold text-success-emerald">${results.percentage}%</span>`
                        : `<span class="text-text-muted text-sm">Pending</span>`;
                    return `
                    <tr class="hover:bg-surface-container-low transition-colors">
                        <td class="px-6 py-4 font-semibold text-primary">${ev.MilestoneTitle || '—'}</td>
                        <td class="px-6 py-4 text-on-surface-variant">${new Date(ev.EvaluationDate).toLocaleDateString()}</td>
                        <td class="px-6 py-4 text-sm text-on-surface-variant">${ev.Evaluators || '—'}</td>
                        <td class="px-6 py-4">${statusBadge(ev.Status)}</td>
                        <td class="px-6 py-4">${scoreCell}</td>
                    </tr>`;
                }).join('');
            } catch(e) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-error">${e.message}</td></tr>`;
            }
        }
        load();
    </script>
</body>
</html>
