<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Milestones | Namal FYP Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="../assets/tailwind-config.js"></script>
    <link href="../assets/styles.css" rel="stylesheet"/>
</head>
<body class="font-body-md text-on-surface">
    <div id="app-sidebar"></div>
    <main class="ml-sidebar-width min-h-screen">
        <div id="app-topnav"></div>
        <div class="pt-24 px-margin-desktop pb-margin-desktop max-w-container-max-width mx-auto space-y-gutter">

            <!-- Header -->
            <header class="flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
                <div>
                    <h1 class="font-headline-lg text-headline-lg text-primary">Milestone Management</h1>
                    <p class="font-body-md text-text-muted">Create, update and delete FYP milestones per batch.</p>
                </div>
                <button id="btn-add-milestone"
                    class="bg-primary text-on-primary px-5 py-2.5 rounded-xl font-label-md flex items-center gap-2 hover:opacity-90 shadow-md">
                    <span class="material-symbols-outlined text-[18px]">add</span> New Milestone
                </button>
            </header>

            <!-- Stats -->
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                <div class="bento-card p-unit-md border-t-4 border-secondary">
                    <h4 class="font-bold text-secondary text-sm">Active</h4>
                    <p class="text-2xl font-bold mt-2" id="stat-active">—</p>
                </div>
                <div class="bento-card p-unit-md border-t-4 border-outline">
                    <h4 class="font-bold text-on-surface-variant text-sm">Closed</h4>
                    <p class="text-2xl font-bold mt-2" id="stat-closed">—</p>
                </div>
                <div class="bento-card p-unit-md border-t-4 border-primary">
                    <h4 class="font-bold text-primary text-sm">Total</h4>
                    <p class="text-2xl font-bold mt-2" id="stat-total">—</p>
                </div>
                <div class="bento-card p-unit-md border-t-4 border-tertiary">
                    <h4 class="font-bold text-tertiary text-sm">Batches</h4>
                    <p class="text-2xl font-bold mt-2" id="stat-batches">—</p>
                </div>
            </div>

            <!-- Filter row -->
            <div class="flex gap-2 flex-wrap">
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[18px]">search</span>
                    <input id="search-input" class="pl-9 pr-4 py-2.5 border border-outline-variant rounded-xl text-sm bg-surface-container-low w-48" placeholder="Search milestones..." type="text"/>
                </div>
                <select id="filter-batch" class="px-4 py-2.5 border border-outline-variant rounded-xl text-sm bg-surface-container-low">
                    <option value="">All Batches</option>
                </select>
                <select id="filter-status" class="px-4 py-2.5 border border-outline-variant rounded-xl text-sm bg-surface-container-low">
                    <option value="">All Statuses</option>
                    <option value="Active">Active</option>
                    <option value="Closed">Closed</option>
                </select>
            </div>

            <!-- Table -->
            <div class="bento-card overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-surface-container-low">
                            <tr>
                                <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Title</th>
                                <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Description</th>
                                <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Due Date</th>
                                <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Weightage</th>
                                <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Batch</th>
                                <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Status</th>
                                <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="ms-tbody" class="divide-y divide-outline-variant">
                            <tr><td colspan="7" class="px-6 py-12 text-center text-on-surface-variant">
                                <span class="material-symbols-outlined text-4xl block text-outline mb-2">hourglass_empty</span>Loading...
                            </td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Create/Edit Modal -->
    <div id="ms-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl">
            <div class="p-6 border-b border-outline-variant/20 flex items-center justify-between">
                <h3 id="modal-title" class="font-headline-sm text-primary">New Milestone</h3>
                <button id="modal-close-btn" class="p-1 hover:bg-surface-container-high rounded-lg">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <form id="ms-form" class="p-6 space-y-4">
                <input type="hidden" id="edit-id"/>
                <div>
                    <label class="block font-label-md font-bold mb-2">Title *</label>
                    <input id="ms-title" type="text" class="w-full px-4 py-3 border border-outline-variant rounded-xl bg-surface-container-low" required/>
                </div>
                <div>
                    <label class="block font-label-md font-bold mb-2">Description</label>
                    <textarea id="ms-desc" rows="3" class="w-full px-4 py-3 border border-outline-variant rounded-xl bg-surface-container-low resize-none"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block font-label-md font-bold mb-2">Due Date *</label>
                        <input id="ms-due" type="date" class="w-full px-4 py-3 border border-outline-variant rounded-xl bg-surface-container-low" required/>
                    </div>
                    <div>
                        <label class="block font-label-md font-bold mb-2">Weightage (%)</label>
                        <input id="ms-wt" type="number" min="0" max="100" step="0.5" class="w-full px-4 py-3 border border-outline-variant rounded-xl bg-surface-container-low" required/>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block font-label-md font-bold mb-2">Batch *</label>
                        <select id="ms-batch" class="w-full px-4 py-3 border border-outline-variant rounded-xl bg-surface-container-low" required>
                            <option value="">Select batch...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-label-md font-bold mb-2">Status</label>
                        <select id="ms-status" class="w-full px-4 py-3 border border-outline-variant rounded-xl bg-surface-container-low">
                            <option value="Active">Active</option>
                            <option value="Closed">Closed</option>
                        </select>
                    </div>
                </div>
                <div id="form-error" class="hidden bg-error-container text-on-error-container rounded-xl px-4 py-3 text-sm"></div>
                <div class="flex gap-3 pt-2">
                    <button type="button" id="modal-cancel-btn" class="flex-1 px-4 py-3 border border-outline-variant rounded-xl font-label-md hover:bg-surface-container-low">Cancel</button>
                    <button type="submit" id="form-submit-btn" class="flex-1 bg-primary text-on-primary px-4 py-3 rounded-xl font-label-md font-bold hover:opacity-90">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../assets/auth.js"></script>
    <script src="../assets/layout.js"></script>
    <script>
        initPage('coordinator', 'milestones');

        const token = getToken();
        const base = '../';
        let allMilestones = [];
        let batches = [];

        const fetchAPI = async (url, opts = {}) => {
            const headers = { 'Authorization': `Bearer ${token}` };
            if (opts.body && !(opts.body instanceof FormData)) {
                headers['Content-Type'] = 'application/json';
                opts.body = JSON.stringify(opts.body);
            }
            const r = await fetch(base + 'api' + url, { ...opts, headers });
            const d = await r.json().catch(() => ({}));
            if (!r.ok) throw new Error(d.message || r.statusText);
            return d;
        };

        const statusBadge = s => {
            const c = s === 'Active' ? 'bg-secondary/10 text-secondary' : 'bg-outline-variant/20 text-on-surface-variant';
            return `<span class="px-2.5 py-0.5 rounded-full text-xs font-bold ${c}">${s}</span>`;
        };

        function renderTable(list) {
            const tbody = document.getElementById('ms-tbody');
            if (!list.length) {
                tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-12 text-center text-on-surface-variant">
                    <span class="material-symbols-outlined text-4xl block text-outline mb-2">inbox</span>No milestones found.</td></tr>`;
                return;
            }
            tbody.innerHTML = list.map(m => `
                <tr class="hover:bg-surface-container-low transition-colors">
                    <td class="px-6 py-4 font-semibold text-primary">${m.Title}</td>
                    <td class="px-6 py-4 text-sm text-on-surface-variant max-w-[200px] truncate" title="${m.Description||''}">${m.Description || '—'}</td>
                    <td class="px-6 py-4 text-on-surface-variant">${new Date(m.DueDate).toLocaleDateString()}</td>
                    <td class="px-6 py-4 font-bold text-secondary">${m.Weightage}%</td>
                    <td class="px-6 py-4 text-sm">${m.BatchName}</td>
                    <td class="px-6 py-4">${statusBadge(m.Status)}</td>
                    <td class="px-6 py-4 text-center">
                        <div class="flex items-center justify-center gap-2">
                            <button class="edit-btn px-3 py-1.5 bg-primary/10 text-primary rounded-lg text-xs font-bold hover:bg-primary/20 transition-colors flex items-center gap-1"
                                data-id="${m.MilestoneID}"
                                data-title="${m.Title}"
                                data-desc="${(m.Description||'').replace(/"/g,'&quot;')}"
                                data-due="${m.DueDate ? m.DueDate.substring(0,10) : ''}"
                                data-wt="${m.Weightage}"
                                data-batch="${m.BatchID}"
                                data-status="${m.Status}">
                                <span class="material-symbols-outlined text-[14px]">edit</span> Edit
                            </button>
                            <button class="delete-btn px-3 py-1.5 bg-error/10 text-error rounded-lg text-xs font-bold hover:bg-error/20 transition-colors flex items-center gap-1"
                                data-id="${m.MilestoneID}" data-title="${m.Title}">
                                <span class="material-symbols-outlined text-[14px]">delete</span> Delete
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');

            // Bind edit buttons
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.onclick = () => openModal('edit', btn.dataset);
            });

            // Bind delete buttons
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.onclick = async () => {
                    if (!confirm(`Delete milestone "${btn.dataset.title}"?\n\nThis will also remove all linked evaluations and submissions.`)) return;
                    try {
                        await fetchAPI(`/milestones/${btn.dataset.id}`, { method: 'DELETE' });
                        showToast('Milestone deleted successfully');
                        await load();
                    } catch(e) { showToast(e.message, true); }
                };
            });
        }

        function applyFilters() {
            const q   = document.getElementById('search-input').value.toLowerCase();
            const bat = document.getElementById('filter-batch').value;
            const st  = document.getElementById('filter-status').value;
            renderTable(allMilestones.filter(m =>
                (!q   || m.Title.toLowerCase().includes(q) || (m.Description||'').toLowerCase().includes(q))
             && (!bat || String(m.BatchID) === bat)
             && (!st  || m.Status === st)
            ));
        }

        document.getElementById('search-input').addEventListener('input', applyFilters);
        document.getElementById('filter-batch').addEventListener('change', applyFilters);
        document.getElementById('filter-status').addEventListener('change', applyFilters);

        // Modal
        const modal = document.getElementById('ms-modal');
        const openModal = (mode, data = {}) => {
            document.getElementById('modal-title').textContent = mode === 'edit' ? 'Edit Milestone' : 'New Milestone';
            document.getElementById('form-submit-btn').textContent = mode === 'edit' ? 'Save Changes' : 'Create';
            document.getElementById('edit-id').value       = data.id || '';
            document.getElementById('ms-title').value      = data.title || '';
            document.getElementById('ms-desc').value       = data.desc || '';
            document.getElementById('ms-due').value        = data.due || '';
            document.getElementById('ms-wt').value         = data.wt || '';
            document.getElementById('ms-batch').value      = data.batch || '';
            document.getElementById('ms-status').value     = data.status || 'Active';
            document.getElementById('form-error').classList.add('hidden');
            modal.classList.remove('hidden');
        };
        const closeModal = () => modal.classList.add('hidden');

        document.getElementById('btn-add-milestone').onclick = () => openModal('create');
        document.getElementById('modal-close-btn').onclick   = closeModal;
        document.getElementById('modal-cancel-btn').onclick  = closeModal;
        modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

        // Form submit
        document.getElementById('ms-form').addEventListener('submit', async e => {
            e.preventDefault();
            const errEl = document.getElementById('form-error');
            errEl.classList.add('hidden');
            const id = document.getElementById('edit-id').value;
            const body = {
                title:       document.getElementById('ms-title').value.trim(),
                description: document.getElementById('ms-desc').value.trim(),
                dueDate:     document.getElementById('ms-due').value,
                weightage:   document.getElementById('ms-wt').value,
                batchId:     document.getElementById('ms-batch').value,
                status:      document.getElementById('ms-status').value
            };
            try {
                if (id) {
                    await fetchAPI(`/milestones/${id}`, { method: 'PUT', body });
                    showToast('Milestone updated successfully');
                } else {
                    await fetchAPI('/milestones', { method: 'POST', body });
                    showToast('Milestone created successfully');
                }
                closeModal();
                await load();
            } catch(err) {
                errEl.textContent = err.message;
                errEl.classList.remove('hidden');
            }
        });

        async function load() {
            try {
                [allMilestones, batches] = await Promise.all([
                    fetchAPI('/milestones'),
                    fetchAPI('/batches')
                ]);

                // Stats
                document.getElementById('stat-active').textContent  = allMilestones.filter(m => m.Status === 'Active').length;
                document.getElementById('stat-closed').textContent  = allMilestones.filter(m => m.Status === 'Closed').length;
                document.getElementById('stat-total').textContent   = allMilestones.length;
                document.getElementById('stat-batches').textContent = batches.length;

                // Populate batch dropdowns
                const batchOpts = batches.map(b => `<option value="${b.BatchID}">${b.BatchName}</option>`).join('');
                document.getElementById('filter-batch').innerHTML = `<option value="">All Batches</option>${batchOpts}`;
                document.getElementById('ms-batch').innerHTML = `<option value="">Select batch...</option>${batchOpts}`;

                renderTable(allMilestones);
            } catch(e) {
                document.getElementById('ms-tbody').innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-error">${e.message}</td></tr>`;
            }
        }

        function showToast(msg, isError = false) {
            const t = document.createElement('div');
            t.className = `fixed bottom-6 right-6 ${isError ? 'bg-error text-on-error' : 'bg-success-emerald text-white'} px-5 py-3 rounded-xl shadow-xl flex items-center gap-2 z-50 font-label-md`;
            t.innerHTML = `<span class="material-symbols-outlined">${isError ? 'error' : 'check_circle'}</span>${msg}`;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 4000);
        }

        load();
    </script>
</body>
</html>
