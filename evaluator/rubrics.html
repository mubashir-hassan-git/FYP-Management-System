<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Rubrics | Namal FYP Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="../assets/tailwind-config.js"></script>
    <link href="../assets/styles.css" rel="stylesheet"/>
</head>
<body class="font-body-md text-on-surface">
<div id="app-sidebar"></div>
<main class="ml-sidebar-width min-h-screen">
    <div id="app-topnav"></div>
    <div class="pt-24 px-margin-desktop pb-margin-desktop max-w-container-max-width mx-auto space-y-gutter">

        <header>
            <h1 class="font-headline-lg text-headline-lg text-primary">Evaluation Rubrics</h1>
            <p class="font-body-md text-text-muted">Click any evaluation to view its rubric criteria and your marks.</p>
        </header>

        <div class="bento-card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-surface-container-low">
                        <tr>
                            <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Evaluation</th>
                            <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Group</th>
                            <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Milestone</th>
                            <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Date</th>
                            <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Criteria</th>
                            <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase">Status</th>
                            <th class="px-6 py-4 font-label-sm text-on-surface-variant uppercase text-center">View</th>
                        </tr>
                    </thead>
                    <tbody id="rubric-tbody" class="divide-y divide-outline-variant">
                        <tr><td colspan="7" class="px-6 py-12 text-center text-on-surface-variant">
                            <span class="material-symbols-outlined text-4xl block text-outline mb-2">hourglass_empty</span>Loading...
                        </td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<!-- Rubric Detail Modal -->
<div id="rubric-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl w-full max-w-2xl shadow-2xl max-h-[90vh] flex flex-col">
        <div class="p-6 border-b border-outline-variant/20 flex items-center justify-between">
            <div>
                <h3 id="modal-title" class="font-headline-sm text-primary">Rubric Details</h3>
                <p id="modal-subtitle" class="font-label-sm text-on-surface-variant mt-0.5"></p>
            </div>
            <button id="close-modal" class="p-1.5 hover:bg-surface-container-high rounded-lg"><span class="material-symbols-outlined">close</span></button>
        </div>
        <div id="modal-content" class="flex-1 overflow-y-auto p-6">
            <div class="text-center py-8 text-on-surface-variant">Loading...</div>
        </div>
        <div class="p-4 border-t border-outline-variant/20 flex justify-end gap-2">
            <button id="close-modal-2" class="px-4 py-2.5 border border-outline-variant rounded-xl text-sm font-label-md hover:bg-surface-container-low">Close</button>
            <a id="modal-mark-link" href="marking.html" class="hidden bg-primary text-on-primary px-5 py-2.5 rounded-xl text-sm font-label-md font-bold hover:opacity-90">Go to Marking Sheet</a>
        </div>
    </div>
</div>

<script src="../assets/auth.js"></script>
<script src="../assets/layout.js"></script>
<script>
    initPage('evaluator', 'rubrics');

    const token = getToken();
    const base = '../';
    let evalList = [];

    const fetchAPI = async (url, opts = {}) => {
        const r = await fetch(base + 'api' + url, { ...opts, headers: { 'Authorization': `Bearer ${token}`, ...(opts.headers||{}) } });
        const d = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(d.message || r.statusText);
        return d;
    };

    const statusBadge = s => {
        const m = { 'Completed':'bg-success-emerald/10 text-success-emerald', 'Scheduled':'bg-warning-amber/10 text-warning-amber', 'Absent':'bg-error/10 text-error' };
        return `<span class="px-2.5 py-0.5 rounded-full text-xs font-bold ${m[s]||'bg-outline-variant/20 text-text-muted'}">${s}</span>`;
    };

    async function openModal(evalId) {
        const modal = document.getElementById('rubric-modal');
        const content = document.getElementById('modal-content');
        modal.classList.remove('hidden');
        content.innerHTML = '<div class="text-center py-8 text-on-surface-variant"><span class="material-symbols-outlined text-4xl block mb-2">hourglass_empty</span>Loading...</div>';

        try {
            const data = await fetchAPI(`/evaluations/marking-sheet/${evalId}`);
            document.getElementById('modal-title').textContent = data.evaluation.projectTitle;
            document.getElementById('modal-subtitle').textContent = `${data.evaluation.groupName} · ${data.evaluation.milestone}`;
            const markLink = document.getElementById('modal-mark-link');
            if (data.evaluation.status === 'Scheduled') {
                markLink.href = `marking.html?id=${evalId}`;
                markLink.classList.remove('hidden');
            } else {
                markLink.classList.add('hidden');
            }

            if (!data.rubrics.length) {
                content.innerHTML = '<p class="text-on-surface-variant text-center py-8">No criteria defined for this evaluation.</p>';
                return;
            }

            const totalMax = data.rubrics.reduce((s, r) => s + r.maxMarks, 0);
            const totalObt = data.rubrics.reduce((s, r) => s + (r.obtainedMarks || 0), 0);

            content.innerHTML = `
                <div class="space-y-4">
                    ${data.evaluation.status === 'Completed' ? `
                    <div class="bg-success-emerald/10 border border-success-emerald/20 rounded-xl p-4 flex items-center justify-between">
                        <span class="font-label-md font-bold text-success-emerald">Total Score</span>
                        <span class="text-2xl font-bold text-success-emerald">${totalObt} / ${totalMax} (${totalMax>0?((totalObt/totalMax)*100).toFixed(1):0}%)</span>
                    </div>` : ''}
                    ${data.rubrics.map(r => `
                    <div class="bg-surface-container-low rounded-xl p-4 border border-outline-variant/20">
                        <div class="flex items-start justify-between mb-2">
                            <h4 class="font-semibold text-on-surface">${r.criteriaName}</h4>
                            <span class="text-sm font-bold ${r.obtainedMarks!=null?'text-primary':'text-on-surface-variant'}">
                                ${r.obtainedMarks!=null ? `${r.obtainedMarks} / ${r.maxMarks}` : `Max: ${r.maxMarks}`}
                            </span>
                        </div>
                        <p class="text-xs text-on-surface-variant">${r.description||'—'}</p>
                        ${r.remarks ? `<p class="text-xs text-secondary mt-2 italic">"${r.remarks}"</p>` : ''}
                        ${r.obtainedMarks!=null ? `
                        <div class="mt-2 h-1.5 bg-surface-container-high rounded-full overflow-hidden">
                            <div class="bg-primary h-full rounded-full" style="width:${(r.obtainedMarks/r.maxMarks*100).toFixed(0)}%"></div>
                        </div>` : ''}
                    </div>`).join('')}
                </div>`;
        } catch(e) {
            content.innerHTML = `<div class="text-error text-sm">${e.message}</div>`;
        }
    }

    document.getElementById('close-modal').onclick = () => document.getElementById('rubric-modal').classList.add('hidden');
    document.getElementById('close-modal-2').onclick = () => document.getElementById('rubric-modal').classList.add('hidden');
    document.getElementById('rubric-modal').addEventListener('click', e => { if (e.target === document.getElementById('rubric-modal')) document.getElementById('rubric-modal').classList.add('hidden'); });

    async function load() {
        try {
            const data = await fetchAPI('/evaluations/dashboard');
            evalList = data.evaluations;
            const tbody = document.getElementById('rubric-tbody');
            if (!evalList.length) {
                tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-12 text-center text-on-surface-variant"><span class="material-symbols-outlined text-4xl block text-outline mb-2">inbox</span>No evaluations assigned.</td></tr>`;
                return;
            }
            // Get criteria count for each
            tbody.innerHTML = evalList.map(ev => `
                <tr class="hover:bg-surface-container-low transition-colors cursor-pointer" onclick="openModal(${ev.evaluationId})">
                    <td class="px-6 py-4 font-semibold text-primary">EVAL-${String(ev.evaluationId).padStart(3,'0')}</td>
                    <td class="px-6 py-4">${ev.groupName}</td>
                    <td class="px-6 py-4 text-sm text-on-surface-variant">${ev.milestone}</td>
                    <td class="px-6 py-4 text-on-surface-variant">${new Date(ev.date).toLocaleDateString()}</td>
                    <td class="px-6 py-4 text-secondary font-bold">5 criteria</td>
                    <td class="px-6 py-4">${statusBadge(ev.status)}</td>
                    <td class="px-6 py-4 text-center">
                        <button class="text-primary hover:bg-primary/10 rounded-lg p-1.5">
                            <span class="material-symbols-outlined text-[20px]">visibility</span>
                        </button>
                    </td>
                </tr>`).join('');
        } catch(e) {
            document.getElementById('rubric-tbody').innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-error">${e.message}</td></tr>`;
        }
    }
    load();
</script>
</body>
</html>
