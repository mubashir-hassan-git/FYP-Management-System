<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Feedback | Namal FYP Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="../assets/tailwind-config.js"></script>
    <link href="../assets/styles.css" rel="stylesheet"/>
</head>
<body class="font-body-md text-on-surface">
    <div id="app-sidebar"></div>
    <main class="ml-sidebar-width min-h-screen">
        <div id="app-topnav"></div>
        <div class="pt-24 px-margin-desktop pb-margin-desktop max-w-container-max-width mx-auto space-y-gutter">

            <header class="flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
                <div>
                    <h1 class="font-headline-lg text-headline-lg text-primary">Supervisor Feedback</h1>
                    <p class="font-body-md text-text-muted">All feedback received from your supervisor on submitted work.</p>
                </div>
                <select id="filter-type" class="px-4 py-2.5 border border-outline-variant rounded-xl text-sm bg-surface-container-low">
                    <option value="">All Types</option>
                    <option value="Approval">Approval</option>
                    <option value="Revision Required">Revision Required</option>
                    <option value="Rejection">Rejection</option>
                </select>
            </header>

            <!-- Stats row -->
            <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                <div class="bg-surface-white border border-outline-variant/30 rounded-xl p-4 text-center custom-shadow">
                    <p class="text-2xl font-bold text-primary"          id="stat-total">—</p>
                    <p class="font-label-sm text-on-surface-variant">Total Feedback</p>
                </div>
                <div class="bg-surface-white border border-outline-variant/30 rounded-xl p-4 text-center custom-shadow">
                    <p class="text-2xl font-bold text-success-emerald"  id="stat-approved">—</p>
                    <p class="font-label-sm text-on-surface-variant">Approvals</p>
                </div>
                <div class="bg-surface-white border border-outline-variant/30 rounded-xl p-4 text-center custom-shadow">
                    <p class="text-2xl font-bold text-warning-amber"    id="stat-revision">—</p>
                    <p class="font-label-sm text-on-surface-variant">Revisions Requested</p>
                </div>
            </div>

            <!-- Feedback cards -->
            <div id="feedback-container" class="space-y-4">
                <div class="flex items-center justify-center py-12 text-on-surface-variant">
                    <span class="material-symbols-outlined text-4xl text-outline mr-3">hourglass_empty</span> Loading feedback...
                </div>
            </div>
        </div>
    </main>

    <script src="../assets/auth.js"></script>
    <script src="../assets/layout.js"></script>
    <script>
        initPage('student', 'feedback');

        const token = getToken();
        const base = '../';
        let allFeedback = [];

        const fetchAPI = async (url, opts = {}) => {
            const r = await fetch(base + 'api' + url, {
                ...opts,
                headers: { 'Authorization': `Bearer ${token}`, ...(opts.headers || {}) }
            });
            const d = await r.json().catch(() => ({}));
            if (!r.ok) throw new Error(d.message || r.statusText);
            return d;
        };

        const typeColor = t => ({
            'Approval':         'bg-success-emerald/10 text-success-emerald border-success-emerald/20',
            'Revision Required':'bg-warning-amber/10 text-warning-amber border-warning-amber/20',
            'Rejection':        'bg-error/10 text-error border-error/20'
        }[t] || 'bg-outline-variant/10 text-on-surface-variant border-outline-variant/20');

        const typeIcon = t => ({
            'Approval':         'check_circle',
            'Revision Required':'history_edu',
            'Rejection':        'cancel'
        }[t] || 'forum');

        function renderFeedback(list) {
            const container = document.getElementById('feedback-container');
            if (!list.length) {
                container.innerHTML = `<div class="flex flex-col items-center justify-center py-16 text-on-surface-variant">
                    <span class="material-symbols-outlined text-5xl text-outline mb-3">inbox</span>
                    <p class="font-body-md">No feedback found.</p>
                </div>`;
                return;
            }
            container.innerHTML = list.map(fb => `
                <div class="bg-surface-white border border-outline-variant/30 rounded-2xl p-6 custom-shadow hover:-translate-y-0.5 transition-all">
                    <div class="flex items-start justify-between gap-4 mb-4">
                        <div class="flex items-center gap-3">
                            <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(fb.facultyName)}&background=0D9488&color=fff&bold=true&size=64"
                                 alt="${fb.facultyName}"
                                 class="w-10 h-10 rounded-full object-cover border-2 border-primary/10"/>
                            <div>
                                <p class="font-label-md font-bold text-primary">${fb.facultyName}</p>
                                <p class="font-label-sm text-on-surface-variant">${fb.milestone} · ${new Date(fb.date).toLocaleDateString()}</p>
                            </div>
                        </div>
                        <span class="px-3 py-1 rounded-full text-xs font-bold border flex items-center gap-1 flex-shrink-0 ${typeColor(fb.type)}">
                            <span class="material-symbols-outlined text-[14px]">${typeIcon(fb.type)}</span>
                            ${fb.type}
                        </span>
                    </div>
                    <p class="font-body-md text-on-surface leading-relaxed bg-surface-container-low rounded-xl p-4 border border-outline-variant/20">${fb.comments}</p>
                    <p class="font-label-sm text-on-surface-variant mt-3">Submission version: <span class="font-semibold text-secondary">${fb.version}</span></p>
                </div>
            `).join('');
        }

        async function load() {
            try {
                allFeedback = await fetchAPI('/students/feedback');

                document.getElementById('stat-total').textContent    = allFeedback.length;
                document.getElementById('stat-approved').textContent = allFeedback.filter(f => f.type === 'Approval').length;
                document.getElementById('stat-revision').textContent = allFeedback.filter(f => f.type === 'Revision Required').length;

                renderFeedback(allFeedback);
            } catch(e) {
                document.getElementById('feedback-container').innerHTML = `
                    <div class="bg-error-container text-on-error-container rounded-xl p-4">${e.message}</div>`;
            }
        }

        document.getElementById('filter-type').addEventListener('change', e => {
            const val = e.target.value;
            renderFeedback(val ? allFeedback.filter(f => f.type === val) : allFeedback);
        });

        load();
    </script>
</body>
</html>
