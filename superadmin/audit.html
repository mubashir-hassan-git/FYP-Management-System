<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Audit Log | Namal FYP Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="../assets/tailwind-config.js"></script>
    <link href="../assets/styles.css" rel="stylesheet"/>
</head>
<body class="text-on-surface">
    <div id="app-sidebar"></div>
    <div id="app-topnav"></div>
    <main class="ml-sidebar-width pt-16 min-h-screen bg-background">
        <div class="p-margin-desktop max-w-[1440px] mx-auto space-y-gutter">

            <div>
                <h2 class="font-headline-lg text-headline-lg text-primary">System Audit Log</h2>
                <p class="font-body-md text-on-surface-variant mt-1">Complete history of system changes, account modifications, and administrative actions.</p>
            </div>

            <div class="bg-surface-white rounded-xl custom-shadow border border-outline-variant/30 overflow-hidden">
                <div class="p-unit-lg border-b border-outline-variant/20 flex items-center justify-between">
                    <h3 class="font-headline-sm text-headline-sm">Change History (Last 100 Events)</h3>
                    <div class="flex items-center gap-2">
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[18px]">search</span>
                            <input id="log-search" class="pl-9 pr-4 py-2 bg-surface-container-low border-none rounded-xl text-body-sm w-48" placeholder="Filter log..." type="text"/>
                        </div>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-surface-container-low border-b border-outline-variant/20">
                            <tr>
                                <th class="px-4 py-3 font-label-sm text-on-surface-variant uppercase text-left w-12">#</th>
                                <th class="px-4 py-3 font-label-sm text-on-surface-variant uppercase text-left">Table</th>
                                <th class="px-4 py-3 font-label-sm text-on-surface-variant uppercase text-left">Record ID</th>
                                <th class="px-4 py-3 font-label-sm text-on-surface-variant uppercase text-left">Action</th>
                                <th class="px-4 py-3 font-label-sm text-on-surface-variant uppercase text-left">Old Data</th>
                                <th class="px-4 py-3 font-label-sm text-on-surface-variant uppercase text-left">New Data</th>
                                <th class="px-4 py-3 font-label-sm text-on-surface-variant uppercase text-left">Date/Time</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-outline-variant/10">
                            <tr><td colspan="7" class="px-4 py-8 text-center text-on-surface-variant">Loading audit log...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="../assets/auth.js"></script>
    <script src="../assets/layout.js"></script>
    <script>
        initPage('superadmin', 'audit', { searchPlaceholder: 'Search audit log...' });

        document.getElementById('log-search')?.addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            document.querySelectorAll('table tbody tr').forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
            });
        });
    </script>
</body>
</html>
