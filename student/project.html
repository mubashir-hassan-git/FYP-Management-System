<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Project | Namal FYP Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="../assets/tailwind-config.js"></script>
    <link href="../assets/styles.css" rel="stylesheet"/>
</head>
<body class="font-body-md text-on-surface">
<div id="app-sidebar"></div>
<main class="ml-sidebar-width min-h-screen">
    <div id="app-topnav"></div>
    <div class="pt-24 px-margin-desktop pb-margin-desktop max-w-container-max-width mx-auto space-y-gutter">

        <header>
            <h1 class="font-headline-lg text-headline-lg text-primary">My Project</h1>
            <p class="font-body-md text-text-muted">Your Final Year Project details, domain and supervision team.</p>
        </header>

        <!-- Project info card -->
        <div id="project-card" class="bento-card p-unit-lg">
            <div class="text-center py-8 text-on-surface-variant">
                <span class="material-symbols-outlined text-4xl block text-outline mb-2">hourglass_empty</span>Loading project details...
            </div>
        </div>

        <!-- Supervision team -->
        <div id="supervision-card" class="hidden bento-card p-unit-lg space-y-4">
            <h3 class="font-headline-sm text-headline-sm flex items-center gap-2">
                <span class="material-symbols-outlined text-primary">supervised_user_circle</span> Supervision Team
            </h3>
            <div id="supervision-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
        </div>

        <!-- Milestone progress -->
        <div id="progress-card" class="hidden bento-card p-unit-lg space-y-4">
            <h3 class="font-headline-sm text-headline-sm flex items-center gap-2">
                <span class="material-symbols-outlined text-primary">flag</span> Milestone Progress
            </h3>
            <div id="progress-list" class="space-y-3"></div>
        </div>
    </div>
</main>

<script src="../assets/auth.js"></script>
<script src="../assets/layout.js"></script>
<script>
    initPage('student', 'project');

    const token = getToken();
    const base  = '../';

    const fetchAPI = async (url, opts = {}) => {
        const r = await fetch(base + 'api' + url, { ...opts, headers: { 'Authorization': `Bearer ${token}`, ...(opts.headers||{}) } });
        const d = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(d.message || r.statusText);
        return d;
    };

    async function load() {
        try {
            const data = await fetchAPI('/students/dashboard');
            const s    = data.student;

            // Project card
            const projCard = document.getElementById('project-card');
            if (!s.projectTitle || s.projectTitle === 'N/A') {
                projCard.innerHTML = `<div class="text-center py-12 text-on-surface-variant">
                    <span class="material-symbols-outlined text-5xl block text-outline mb-3">folder_off</span>
                    <p class="font-body-lg font-semibold">No project assigned yet.</p>
                    <p class="font-body-sm mt-1">Please contact the coordinator.</p>
                </div>`;
                return;
            }

            const statusColor = { Approved:'text-success-emerald bg-success-emerald/10', Active:'text-secondary bg-secondary/10', Proposed:'text-warning-amber bg-warning-amber/10', Completed:'text-primary bg-primary/10' };
            const sc = statusColor[s.projectStatus] || 'text-on-surface-variant bg-outline-variant/20';

            projCard.innerHTML = `
                <div class="space-y-6">
                    <div class="flex flex-col md:flex-row md:items-start justify-between gap-4">
                        <div>
                            <h2 class="font-headline-md text-headline-md text-primary mb-2">${s.projectTitle}</h2>
                            <div class="flex items-center gap-3 flex-wrap">
                                <span class="px-3 py-1 rounded-full text-xs font-bold ${sc}">${s.projectStatus}</span>
                                <span class="text-on-surface-variant text-sm flex items-center gap-1">
                                    <span class="material-symbols-outlined text-[16px]">domain</span>${s.projectDomain}
                                </span>
                            </div>
                        </div>
                        <div class="bg-surface-container-low rounded-xl p-4 text-sm flex-shrink-0">
                            <p class="text-on-surface-variant text-xs mb-1">Group</p>
                            <p class="font-bold text-primary">${s.groupName}</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="bg-surface-container-low rounded-xl p-4">
                            <p class="text-xs text-on-surface-variant mb-1">Supervisor</p>
                            <p class="font-semibold text-on-surface">${s.supervisorName||'—'}</p>
                        </div>
                        <div class="bg-surface-container-low rounded-xl p-4">
                            <p class="text-xs text-on-surface-variant mb-1">Co-Supervisor</p>
                            <p class="font-semibold text-on-surface">${s.coSupervisorName||'—'}</p>
                        </div>
                        <div class="bg-surface-container-low rounded-xl p-4">
                            <p class="text-xs text-on-surface-variant mb-1">Total Milestones</p>
                            <p class="font-bold text-2xl text-primary">${data.stats.totalMilestones}</p>
                        </div>
                        <div class="bg-surface-container-low rounded-xl p-4">
                            <p class="text-xs text-on-surface-variant mb-1">Completed</p>
                            <p class="font-bold text-2xl text-success-emerald">${data.stats.completedMilestones}</p>
                        </div>
                    </div>
                    <div>
                        <div class="flex justify-between text-sm mb-2">
                            <span class="font-semibold text-on-surface">Overall Progress</span>
                            <span class="font-bold text-primary">${data.stats.totalMilestones > 0 ? Math.round((data.stats.completedMilestones/data.stats.totalMilestones)*100) : 0}%</span>
                        </div>
                        <div class="h-3 bg-surface-container-high rounded-full overflow-hidden">
                            <div class="bg-primary h-full rounded-full transition-all" style="width:${data.stats.totalMilestones > 0 ? Math.round((data.stats.completedMilestones/data.stats.totalMilestones)*100) : 0}%"></div>
                        </div>
                    </div>
                </div>`;

            // Supervision card
            if (s.supervisorName && s.supervisorName !== 'N/A') {
                const supCard  = document.getElementById('supervision-card');
                const supList  = document.getElementById('supervision-list');
                supCard.classList.remove('hidden');
                const people = [];
                if (s.supervisorName   !== 'N/A') people.push({ name: s.supervisorName,   role: 'Supervisor' });
                if (s.coSupervisorName !== 'N/A') people.push({ name: s.coSupervisorName, role: 'Co-Supervisor' });
                supList.innerHTML = people.map(p => `
                    <div class="flex items-center gap-4 p-4 bg-surface-container-low rounded-xl border border-outline-variant/20">
                        <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(p.name)}&background=0D9488&color=fff&bold=true&size=80"
                             class="w-12 h-12 rounded-full object-cover border-2 border-primary/20"/>
                        <div>
                            <p class="font-semibold text-primary">${p.name}</p>
                            <p class="text-sm text-on-surface-variant">${p.role}</p>
                        </div>
                    </div>`).join('');
            }

            // Milestone progress card
            if (data.timeline && data.timeline.length) {
                const progCard = document.getElementById('progress-card');
                const progList = document.getElementById('progress-list');
                progCard.classList.remove('hidden');
                progList.innerHTML = data.timeline.map(m => {
                    const done = m.status === 'Done';
                    return `
                    <div class="flex items-center gap-4">
                        <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 ${done ? 'bg-success-emerald text-white' : 'bg-surface-container-high text-on-surface-variant border border-outline-variant'}">
                            <span class="material-symbols-outlined text-[16px]">${done ? 'check' : 'hourglass_empty'}</span>
                        </div>
                        <div class="flex-1">
                            <p class="font-semibold text-sm text-on-surface">${m.title}</p>
                            <p class="text-xs text-on-surface-variant">${new Date(m.dueDate).toLocaleDateString()}</p>
                        </div>
                        <span class="text-xs font-bold ${done ? 'text-success-emerald' : 'text-on-surface-variant'}">${m.status}</span>
                    </div>`;
                }).join('');
            }

        } catch(e) {
            document.getElementById('project-card').innerHTML = `<div class="bg-error-container text-on-error-container rounded-xl p-4">${e.message}</div>`;
        }
    }
    load();
</script>
</body>
</html>
